<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsmania - News Aggregation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">Newsmania</h1>
            <nav class="navbar">
                <a href="#" class="nav-link">Home</a>
                <a href="#" class="nav-link">Categories</a>
                <a href="#favorites" class="nav-link">Favorites</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Search Section -->
        <section class="search-section">
            <input type="text" id="searchInput" class="search-box" placeholder="Search news...">
            <select id="categoryFilter" class="category-filter">
                <option value="">All Categories</option>
            </select>
        </section>

        <!-- News Grid -->
        <section id="newsGrid" class="news-grid">
            <!-- Articles will be loaded here -->
        </section>

        <!-- Loading Indicator -->
        <div id="loading" class="loading">Loading...</div>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Newsmania. All rights reserved.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
